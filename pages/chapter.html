<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chapter | DarkensHorns</title>

<meta name="description" content="Read chapter on DarkensHorns">

<link rel="icon" href="../favicon.ico">

<link rel="stylesheet" href="../css/theme.css">
<link rel="stylesheet" href="../css/layout.css">
<link rel="stylesheet" href="../css/header.css">
<link rel="stylesheet" href="../css/navigation.css">
<link rel="stylesheet" href="../css/footer.css">
<link rel="stylesheet" href="../css/chapter.css">

</head>


<body>


<header id="site-header">

    <div class="header-container">

        <a href="../index.html" class="logo">
            DarkensHorns
        </a>


        <nav class="main-navigation">

            <a href="../index.html">
                Home
            </a>

            <a href="series.html">
                Series
            </a>

            <a href="search.html">
                Search
            </a>

        </nav>

    </div>

</header>



<main class="chapter-page">


    <!-- BREADCRUMB -->

    <div class="breadcrumb">

        <a href="../index.html">
            Home
        </a>

        <span>/</span>

        <a id="comic-link" href="#">
            Comic
        </a>

        <span>/</span>

        <span id="chapter-title">
            Chapter
        </span>

    </div>



    <!-- CHAPTER HEADER -->

    <section class="chapter-header">

        <h1 id="comic-name">
            Loading...
        </h1>

        <h2 id="chapter-name">
            Loading chapter...
        </h2>

        <div class="chapter-info">

            <span id="chapter-pages">
                Pages: -
            </span>

            <span id="chapter-date">
                Date: -
            </span>

        </div>

    </section>



    <!-- READING MODE -->

    <section class="reading-options">

        <div class="reader-buttons">

            <button
                id="grid-reader"
                class="reader-button active">
                📖 Normal Mode
            </button>


            <button
                id="webtoon-reader"
                class="reader-button">
                📱 Webtoon Mode
            </button>

        </div>

    </section>



    <!-- CHAPTER PAGES -->

    <section class="chapter-preview">

        <div
            id="preview-container"
            class="preview-grid">
        </div>

    </section>



    <!-- CHAPTER NAVIGATION -->

    <section class="chapter-navigation">

        <a
            id="previous-chapter"
            class="button">
            ← Previous Chapter
        </a>


        <a
            id="back-comic"
            class="button primary">
            Back to Comic
        </a>


        <a
            id="next-chapter"
            class="button">
            Next Chapter →
        </a>

    </section>


</main>



<footer id="site-footer">

    <div class="footer-container">

        <p>
            © DarkensHorns
        </p>

    </div>

</footer>



<!-- IMAGE VIEWER -->

<div
    id="image-viewer"
    class="image-viewer">


    <button
        id="viewer-close"
        class="viewer-close">
        ×
    </button>


    <button
        id="viewer-prev"
        class="viewer-navigation viewer-prev">
        ‹
    </button>


    <div class="viewer-content">

        <img
            id="viewer-image"
            src=""
            alt="Comic page">

    </div>


    <button
        id="viewer-next"
        class="viewer-navigation viewer-next">
        ›
    </button>

</div>



<script src="../js/chapter.js"></script>

</body>

</html>
