<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Chapter | DarkensHorns</title>

    <meta
        name="description"
        content="Read chapter on DarkensHorns"
    >

    <link
        rel="icon"
        href="../favicon.ico"
    >

    <link
        rel="stylesheet"
        href="../css/theme.css"
    >

    <link
        rel="stylesheet"
        href="../css/layout.css"
    >

    <link
        rel="stylesheet"
        href="../css/header.css"
    >

    <link
        rel="stylesheet"
        href="../css/navigation.css"
    >

    <link
        rel="stylesheet"
        href="../css/footer.css"
    >

    <link
        rel="stylesheet"
        href="../css/chapter.css"
    >

</head>


<body>


<header id="site-header">

    <div class="header-container">

        <a
            href="../index.html"
            class="logo"
        >
            DarkensHorns
        </a>


        <nav class="main-navigation">

            <a href="../index.html">
                Home
            </a>

            <a href="series.html">
                Series
            </a>

            <a href="search.html">
                Search
            </a>

        </nav>

    </div>

</header>


<main class="chapter-page">


    <!-- =====================================================
         BREADCRUMB
    ====================================================== -->

    <section class="breadcrumb">

        <a href="../index.html">
            Home
        </a>

        <span>
            /
        </span>

        <a
            id="comic-link"
            href="#"
        >
            Comic
        </a>

        <span>
            /
        </span>

        <span id="chapter-title">
            Chapter
        </span>

    </section>


    <!-- =====================================================
         CHAPTER HEADER
    ====================================================== -->

    <section class="chapter-header">

        <h1 id="comic-name">
            Loading...
        </h1>

        <h2 id="chapter-name">
            Loading chapter...
        </h2>

        <p
            id="chapter-subtitle"
            class="chapter-subtitle"
        >
        </p>


        <div class="chapter-info">

            <span id="chapter-pages">
                Pages: -
            </span>

            <span id="chapter-date">
                Date: -
            </span>

        </div>

    </section>


    <!-- =====================================================
         READING MODE
    ====================================================== -->

    <section class="reading-options">

        <div class="reader-buttons">

            <button
                id="grid-reader"
                class="reader-button active"
                type="button"
            >
                <span class="reader-icon">
                    ▦
                </span>

                <span>
                    Normal Mode
                </span>

            </button>


            <button
                id="webtoon-reader"
                class="reader-button"
                type="button"
            >
                <span class="reader-icon">
                    ☰
                </span>

                <span>
                    Webtoon Mode
                </span>

            </button>

        </div>

    </section>


    <!-- =====================================================
         CHAPTER READER
    ====================================================== -->

    <section class="chapter-preview">

        <div
            id="preview-container"
            class="preview-grid normal-mode"
        >
        </div>

    </section>


    <!-- =====================================================
         CHAPTER NAVIGATION
    ====================================================== -->

    <section class="chapter-navigation">

        <a
            id="previous-chapter"
            class="button"
            href="#"
        >
            ← Previous Chapter
        </a>


        <a
            id="back-comic"
            class="button primary"
            href="#"
        >
            Back to Comic
        </a>


        <a
            id="next-chapter"
            class="button"
            href="#"
        >
            Next Chapter →
        </a>

    </section>


</main>


<footer id="site-footer">

    <div class="footer-container">

        <p>
            © DarkensHorns
        </p>

    </div>

</footer>


<script src="../js/chapter.js"></script>


</body>

</html>
