<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reader | DarkensHorns</title>

<meta name="description" content="DarkensHorns Comic Reader">

<meta name="theme-color" content="#050505">

<link rel="icon" href="../favicon.ico">

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/reader-grid.css">

</head>

<body>

<header class="reader-header">

<a href="../index.html" class="reader-logo">

DarkensHorns

</a>

<nav class="reader-nav">

<a href="../index.html">Home</a>

<a href="series.html">Series</a>

<a href="comic.html" id="comicLink">Comic</a>

</nav>

</header>

<main id="reader">

<section id="readerInfo">

<div class="titles">

<h1 id="comic-title">

Loading...

</h1>

<h2 id="chapter-title">

Loading chapter...

</h2>

</div>

<div class="chapterNavigation">

<button id="previousChapter">

◀ Previous Chapter

</button>

<button id="nextChapter">

Next Chapter ▶

</button>

</div>

</section>

<section id="readerToolbar">

<button id="previousPage">

◀

</button>

<div id="pageCounter">

1 / 1

</div>

<button id="nextPage">

▶

</button>

</section>

<section id="readerStage">

<div id="imageContainer">

<div class="reader-loading">

Loading...

</div>

</div>

</section>

<section id="readerOptions">

<button id="zoomOut">

−

</button>

<div id="zoomValue">

100%

</div>

<button id="zoomIn">

+

</button>

<button id="fitWidth">

Fit Width

</button>

<button id="fitHeight">

Fit Height

</button>

<button id="fullscreenButton">

Fullscreen

</button>

<a id="switchWebtoon">

Webtoon Mode

</a>

</section>

<section id="readerProgress">

<div id="progressBar">

<div id="progressValue"></div>

</div>

</section>

<section id="readerBottom">

<button id="footerPrevious">

◀ Previous

</button>

<button id="footerNext">

Next ▶

</button>

</section>

</main>

<footer>

<p>

© DarkensHorns

</p>

</footer>

<script src="../js/reader-grid.js"></script>

</body>

</html>
